<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#f0efed;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:#e5e4e0;--border2:#d0cfcb;
  --info-bg:#eff6ff;--info:#1d6fbf;
  --success-bg:#f0fdf4;--success:#166534;
  --warn-bg:#fffbeb;--warn:#92400e;
  --danger-bg:#fef2f2;--danger:#991b1b;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
    --text:#f0eeeb;--text2:#a8a8a0;--text3:#6b6b65;
    --border:#3a3a38;--border2:#484844;
    --info-bg:#0c2a4a;--info:#60a5fa;
    --success-bg:#0a2e1a;--success:#4ade80;
    --warn-bg:#2a1f08;--warn:#fbbf24;
    --danger-bg:#2a0f0f;--danger:#f87171;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:15px}
header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
header h1{font-size:17px;font-weight:500}
header p{font-size:12px;color:var(--text2);margin-top:1px}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.main{max-width:1100px;margin:0 auto;padding:20px 16px}
.add-bar{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
.add-bar input{flex:1;min-width:200px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:14px;outline:none}
.add-bar input:focus{border-color:var(--info);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.add-bar input::placeholder{color:var(--text3)}
.btn{padding:10px 18px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.primary:hover{opacity:.88}
.btn.danger{color:var(--danger);border-color:var(--danger-bg)}
.btn.danger:hover{background:var(--danger-bg)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.err{font-size:12px;color:var(--danger);margin-top:6px;width:100%}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:500}
.tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:20px}
.tab{font-size:13px;padding:10px 18px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;position:relative;display:flex;flex-direction:column;gap:0}
.card-addr{font-size:14px;font-weight:500;padding-right:30px;line-height:1.4;margin-bottom:2px}
.card-type{font-size:12px;color:var(--text2);margin-bottom:10px}
.card-price{font-size:22px;font-weight:500;margin-bottom:10px}
.specs{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);margin-bottom:14px;flex-wrap:wrap}
.spec{display:flex;align-items:center;gap:4px}
.spec-dot{color:var(--border2)}
.section-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;margin-top:14px}
.inspect-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:13px}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px}
.badge.weekend{background:var(--warn-bg);color:var(--warn)}
.badge.auction{background:var(--danger-bg);color:var(--danger)}
.badge.info{background:var(--info-bg);color:var(--info)}
.desc-text{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.desc-text.open{display:block}
.read-more-btn{font-size:12px;color:var(--info);background:none;border:none;cursor:pointer;padding:4px 0 0}
.card-footer{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);flex-wrap:wrap}
.card-link{font-size:12px;color:var(--info);display:inline-flex;align-items:center;gap:4px;text-decoration:none}
.card-link:hover{text-decoration:underline}
.remove-btn{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px}
.remove-btn:hover{color:var(--danger)}
.skel{background:var(--bg2);border-radius:4px;height:14px;margin-bottom:8px}
.skel.w80{width:80%}.skel.w50{width:50%}.skel.w35{width:35%}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:1}}
.skel{animation:shimmer 1.2s ease-in-out infinite}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty i{font-size:40px;opacity:.3;display:block;margin-bottom:14px}
.empty h3{font-size:15px;font-weight:500;margin-bottom:6px;color:var(--text)}
.plan-day-hdr{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:20px}
.plan-day-hdr:first-child{margin-top:0}
.plan-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:flex;gap:12px}
.plan-time{font-size:13px;font-weight:500;color:var(--info);min-width:64px;padding-top:1px}
.plan-body{flex:1}
.plan-addr{font-size:13px;font-weight:500}
.plan-meta{font-size:12px;color:var(--text2);margin-top:2px}
.plan-links{display:flex;gap:10px;margin-top:6px}
.no-inspect{font-size:12px;color:var(--text3);font-style:italic}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.settings-overlay.open{display:flex}
.settings-box{background:var(--bg);border-radius:var(--radius-lg);padding:24px;max-width:420px;width:90%;position:relative}
.settings-box h2{font-size:16px;font-weight:500;margin-bottom:16px}
.settings-box label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px}
.settings-box input{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:14px;margin-bottom:14px;outline:none}
.settings-note{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:16px;padding:10px 12px;background:var(--info-bg);border-radius:var(--radius);color:var(--info)}
.close-settings{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2)}
@media(max-width:600px){
  .cards{grid-template-columns:1fr}
  .add-bar{flex-direction:column}
  .add-bar input{min-width:unset}
  header h1{font-size:15px}
}
</style>
</head>
<body>

<header>
  <i class="ti ti-building" style="font-size:22px;color:var(--text2)"></i>
  <div>
    <h1>Property Tracker</h1>
    <p>Add listings to plan your inspections</p>
  </div>
  <div class="header-right">
    <button class="btn" onclick="openSettings()" title="Settings"><i class="ti ti-settings"></i> API key</button>
    <button class="btn" onclick="exportData()" title="Export"><i class="ti ti-download"></i></button>
    <button class="btn danger" onclick="clearAll()" title="Clear all"><i class="ti ti-trash"></i></button>
  </div>
</header>

<div class="main">
  <div class="add-bar">
    <input type="text" id="url-input" placeholder="Paste a Domain or realestate.com.au property URL..." onkeydown="if(event.key==='Enter')addProperty()">
    <button class="btn primary" onclick="addProperty()" id="add-btn"><i class="ti ti-plus"></i> Add property</button>
    <div id="input-err" class="err" style="display:none"></div>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-label">Saved</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">This weekend</div><div class="stat-val" id="s-weekend">0</div></div>
    <div class="stat"><div class="stat-label">Next inspection</div><div class="stat-val" id="s-next" style="font-size:14px">—</div></div>
    <div class="stat"><div class="stat-label">Avg. price guide</div><div class="stat-val" id="s-avg" style="font-size:13px">—</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('properties')" id="tab-properties"><i class="ti ti-layout-cards"></i> All properties</button>
    <button class="tab" onclick="switchTab('plan')" id="tab-plan"><i class="ti ti-calendar-event"></i> Inspection planner</button>
  </div>

  <div id="view-properties">
    <div class="cards" id="cards-container"></div>
  </div>

  <div id="view-plan" style="display:none">
    <div id="plan-container"></div>
  </div>
</div>

<div class="settings-overlay" id="settings-overlay">
  <div class="settings-box">
    <button class="close-settings" onclick="closeSettings()"><i class="ti ti-x"></i></button>
    <h2>API key settings</h2>
    <div class="settings-note"><i class="ti ti-info-circle"></i> Your Anthropic API key is stored only in your browser's localStorage. It is never sent anywhere except directly to Anthropic's API to fetch property data.</div>
    <label>Anthropic API key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button class="btn primary" onclick="saveApiKey()" style="width:100%">Save key</button>
  </div>
</div>

<script>
const API_URL = '/.netlify/functions/claude';
let properties = [];
let activeTab = 'properties';

function getApiKey() {
  return localStorage.getItem('prop-tracker-api-key') || '';
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant')) {
    alert('Please enter a valid Anthropic API key starting with sk-ant-');
    return;
  }
  localStorage.setItem('prop-tracker-api-key', val);
  closeSettings();
  alert('API key saved!');
}

function openSettings() {
  document.getElementById('api-key-input').value = getApiKey();
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('prop-tracker-properties');
    if (raw) properties = JSON.parse(raw);
  } catch(e) { properties = []; }
  renderAll();
}

function saveToStorage() {
  localStorage.setItem('prop-tracker-properties', JSON.stringify(properties));
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-properties').classList.toggle('active', tab === 'properties');
  document.getElementById('tab-plan').classList.toggle('active', tab === 'plan');
  document.getElementById('view-properties').style.display = tab === 'properties' ? '' : 'none';
  document.getElementById('view-plan').style.display = tab === 'plan' ? '' : 'none';
  if (tab === 'plan') renderPlan();
}

async function addProperty() {
  const input = document.getElementById('url-input');
  const errEl = document.getElementById('input-err');
  const btn = document.getElementById('add-btn');
  const url = input.value.trim();

  errEl.style.display = 'none';

  if (!url) { showErr('Please paste a property URL'); return; }
  if (!url.startsWith('http')) { showErr('Please enter a valid URL starting with https://'); return; }
  if (properties.find(p => p.url === url)) { showErr('This property is already in your list'); return; }

  const apiKey = getApiKey();
  if (!apiKey) {
    showErr('Please add your Anthropic API key first (click "API key" button in the header)');
    openSettings();
    return;
  }

  const id = Date.now();
  properties.push({ id, url, status: 'loading', addedAt: new Date().toISOString() });
  input.value = '';
  btn.disabled = true;
  renderAll();

  try {
    const data = await fetchPropertyData(url, apiKey);
    const idx = properties.findIndex(p => p.id === id);
    if (idx !== -1) Object.assign(properties[idx], data, { status: 'loaded' });
  } catch(e) {
    const idx = properties.findIndex(p => p.id === id);
    if (idx !== -1) {
      properties[idx].status = 'error';
      properties[idx].errorMsg = e.message || 'Could not fetch property data. Check your API key.';
    }
  }

  btn.disabled = false;
  saveToStorage();
  renderAll();
}

function showErr(msg) {
  const el = document.getElementById('input-err');
  el.textContent = msg;
  el.style.display = 'block';
}

async function fetchPropertyData(url, apiKey) {
  const listingId = url.match(/(\d{7,})/)?.[1] || '';
  const suburb = url.match(/(?:nsw|vic|qld|sa|wa|tas|act|nt)-([^-/]+(?:-[^-/]+)*)-\d/)?.[1]?.replace(/-/g,' ') || '';
  const PROMPT = `I need detailed information about this Australian property listing.

Listing URL: ${url}
${listingId ? `Listing ID: ${listingId}` : ''}
${suburb ? `Suburb: ${suburb}` : ''}

Instructions:
1. Search for the listing ID "${listingId}" site:realestate.com.au to find the property page
2. Also search for the address + "open home" or "inspection" to find upcoming times
3. Extract ALL details available

Return ONLY raw JSON (no markdown, no backticks, no explanation):
{
  "address": "full street address including unit number",
  "suburb": "suburb name",
  "priceGuide": "$1,400,000 or Guide $1.4M or Contact Agent",
  "bedrooms": 3,
  "bathrooms": 2,
  "parking": 1,
  "propertyType": "townhouse",
  "internalSize": "127m\u00b2 or null",
  "description": "first 2-3 sentences of listing description",
  "inspections": [{"date": "Saturday 14 Jun", "time": "10:00am - 10:30am"}],
  "auctionDate": "Saturday 20 Jun 11:00am or null",
  "agent": "agent full name",
  "agency": "agency name",
  "schoolCatchment": "primary school or null",
  "outgoings": "strata/council/water or null"
}
Use null for unknown fields. Include ALL upcoming inspections found.`;

  const messages = [{ role: 'user', content: PROMPT }];
  const tools = [{ type: 'web_search_20250305', name: 'web_search' }];

  // Agentic loop — keep going until Claude gives a final text response
  for (let i = 0; i < 8; i++) {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        tools,
        messages
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const json = await response.json();

    // If stop_reason is end_turn, extract the JSON text and return
    if (json.stop_reason === 'end_turn') {
      const text = json.content.map(b => b.type === 'text' ? b.text : '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      const start = clean.indexOf('{');
      const end = clean.lastIndexOf('}');
      if (start === -1) throw new Error('No JSON in response');
      return JSON.parse(clean.slice(start, end + 1));
    }

    // If Claude used tool(s), add its response and the tool results to messages, then loop
    if (json.stop_reason === 'tool_use') {
      messages.push({ role: 'assistant', content: json.content });
      const toolResults = json.content
        .filter(b => b.type === 'tool_use')
        .map(b => ({
          type: 'tool_result',
          tool_use_id: b.id,
          content: b.type === 'tool_use' ? (b.content || '') : ''
        }));
      messages.push({ role: 'user', content: toolResults });
      continue;
    }

    // Unexpected stop reason — try to extract text anyway
    const text = json.content.map(b => b.type === 'text' ? b.text : '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const start = clean.indexOf('{');
    const end = clean.lastIndexOf('}');
    if (start !== -1) return JSON.parse(clean.slice(start, end + 1));
    throw new Error('Unexpected response from API');
  }

  throw new Error('Too many tool calls — could not extract property data');
}

function removeProperty(id) {
  if (!confirm('Remove this property?')) return;
  properties = properties.filter(p => p.id !== id);
  saveToStorage();
  renderAll();
}

async function retryProperty(id) {
  const p = properties.find(x => x.id === id);
  if (!p) return;
  const apiKey = getApiKey();
  if (!apiKey) { openSettings(); return; }
  p.status = 'loading';
  p.errorMsg = null;
  renderAll();
  try {
    const data = await fetchPropertyData(p.url, apiKey);
    Object.assign(p, data, { status: 'loaded' });
  } catch(e) {
    p.status = 'error';
    p.errorMsg = e.message || 'Failed to load';
  }
  saveToStorage();
  renderAll();
}

function toggleDesc(id) {
  const el = document.getElementById('desc-' + id);
  const btn = document.getElementById('rm-' + id);
  const open = el.classList.toggle('open');
  btn.textContent = open ? 'Show less' : 'Read more';
}

function isThisWeekend(dateStr) {
  if (!dateStr) return false;
  const d = dateStr.toLowerCase();
  if (d.includes('sat') || d.includes('sun')) {
    const now = new Date();
    const day = now.getDay();
    const daysToSat = (6 - day + 7) % 7;
    const thisSat = new Date(now); thisSat.setDate(now.getDate() + daysToSat);
    const thisSatStr = thisSat.toLocaleDateString('en-AU', { day:'numeric', month:'short' }).toLowerCase();
    const nextSat = new Date(thisSat); nextSat.setDate(thisSat.getDate() + 7);
    const nextSatStr = nextSat.toLocaleDateString('en-AU', { day:'numeric', month:'short' }).toLowerCase();
    return d.includes(thisSatStr) || d.includes(nextSatStr.slice(0,3)) || (d.includes('sat') && daysToSat <= 6) || (d.includes('sun') && ((7 - day) % 7) <= 6);
  }
  return false;
}

function renderCard(p) {
  if (p.status === 'loading') return `<div class="card">
    <div class="skel w80"></div><div class="skel w50"></div><div class="skel w35"></div>
    <div style="margin-top:14px"><div class="skel w80"></div><div class="skel w50"></div></div>
  </div>`;

  if (p.status === 'error') return `<div class="card">
    <button class="remove-btn" onclick="removeProperty(${p.id})"><i class="ti ti-x"></i></button>
    <div style="font-size:12px;color:var(--text2);word-break:break-all;margin-bottom:10px">${p.url}</div>
    <div style="font-size:13px;color:var(--danger);margin-bottom:12px"><i class="ti ti-alert-circle"></i> ${p.errorMsg || 'Failed to load'}</div>
    <button class="btn" onclick="retryProperty(${p.id})"><i class="ti ti-refresh"></i> Retry</button>
  </div>`;

  const specs = [
    p.bedrooms != null ? `<span class="spec"><i class="ti ti-bed"></i> ${p.bedrooms} bed</span>` : '',
    p.bathrooms != null ? `<span class="spec"><i class="ti ti-bath"></i> ${p.bathrooms} bath</span>` : '',
    p.parking != null ? `<span class="spec"><i class="ti ti-car"></i> ${p.parking} car</span>` : '',
    p.internalSize ? `<span class="spec"><i class="ti ti-ruler"></i> ${p.internalSize}</span>` : '',
  ].filter(Boolean).join('<span class="spec-dot">·</span>');

  const inspHtml = (p.inspections && p.inspections.length)
    ? p.inspections.map(i => {
        const wk = isThisWeekend(i.date) ? '<span class="badge weekend">This weekend</span>' : '';
        return `<div class="inspect-row"><i class="ti ti-clock" style="font-size:14px;color:var(--text2)"></i> ${i.date}, ${i.time} ${wk}</div>`;
      }).join('')
    : `<div class="no-inspect">No upcoming inspections listed</div>`;

  const auctionHtml = p.auctionDate
    ? `<div class="inspect-row" style="margin-top:4px"><i class="ti ti-gavel" style="font-size:14px;color:var(--text2)"></i> Auction: ${p.auctionDate} <span class="badge auction">Auction</span></div>` : '';

  const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent((p.address || '') + ' ' + (p.suburb || ''))}`;

  return `<div class="card">
    <button class="remove-btn" onclick="removeProperty(${p.id})" title="Remove"><i class="ti ti-x"></i></button>
    <div class="card-addr">${p.address || 'Address unavailable'}</div>
    <div class="card-type">${[p.suburb, p.propertyType].filter(Boolean).join(' · ')}</div>
    <div class="card-price">${p.priceGuide || 'Contact Agent'}</div>
    ${specs ? `<div class="specs">${specs}</div>` : ''}
    <div class="section-lbl">Inspections</div>
    ${inspHtml}${auctionHtml}
    ${p.description ? `<div class="section-lbl">Description</div>
    <div class="desc-text" id="desc-${p.id}">${p.description}</div>
    <button class="read-more-btn" id="rm-${p.id}" onclick="toggleDesc(${p.id})">Read more</button>` : ''}
    ${p.schoolCatchment ? `<div class="section-lbl">School catchment</div>
    <div style="font-size:13px"><i class="ti ti-school" style="font-size:13px;margin-right:4px"></i>${p.schoolCatchment}</div>` : ''}
    ${p.outgoings ? `<div class="section-lbl">Outgoings</div>
    <div style="font-size:12px;color:var(--text2)">${p.outgoings}</div>` : ''}
    ${p.agent ? `<div class="section-lbl">Agent</div>
    <div style="font-size:12px;color:var(--text2)">${p.agent}${p.agency ? ' · ' + p.agency : ''}</div>` : ''}
    <div class="card-footer">
      <a href="${p.url}" target="_blank" class="card-link"><i class="ti ti-external-link" style="font-size:12px"></i> View listing</a>
      <a href="${mapsUrl}" target="_blank" class="card-link"><i class="ti ti-map-pin" style="font-size:12px"></i> Directions</a>
    </div>
  </div>`;
}

function renderPlan() {
  const container = document.getElementById('plan-container');
  const loaded = properties.filter(p => p.status === 'loaded' && p.inspections && p.inspections.length);

  if (!loaded.length) {
    container.innerHTML = `<div class="empty"><i class="ti ti-calendar"></i><h3>No inspections to plan</h3><p>Add properties with upcoming inspections to see your schedule</p></div>`;
    return;
  }

  const grouped = {};
  loaded.forEach(p => p.inspections.forEach(ins => {
    const key = ins.date || 'Date unknown';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push({ ...ins, property: p });
  }));

  Object.values(grouped).forEach(g => g.sort((a,b) => (a.time||'').localeCompare(b.time||'')));

  const html = Object.entries(grouped).map(([day, items]) => {
    const wk = isThisWeekend(day);
    const rows = items.map(item => {
      const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent((item.property.address||'') + ' ' + (item.property.suburb||''))}`;
      return `<div class="plan-item">
        <div class="plan-time">${(item.time||'').split(' - ')[0]}</div>
        <div class="plan-body">
          <div class="plan-addr">${item.property.address || item.property.url}</div>
          <div class="plan-meta">${item.property.priceGuide || 'Contact Agent'} · ${item.time || ''}</div>
          <div class="plan-links">
            <a href="${item.property.url}" target="_blank" class="card-link"><i class="ti ti-external-link" style="font-size:11px"></i> Listing</a>
            <a href="${mapsUrl}" target="_blank" class="card-link"><i class="ti ti-map-pin" style="font-size:11px"></i> Directions</a>
          </div>
        </div>
      </div>`;
    }).join('');

    return `<div>
      <div class="plan-day-hdr">
        <i class="ti ti-calendar-event" style="font-size:16px;color:var(--text2)"></i>
        ${day}
        ${wk ? '<span class="badge info">This weekend</span>' : ''}
        <span style="font-size:12px;color:var(--text2)">${items.length} inspection${items.length>1?'s':''}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');

  container.innerHTML = html;
}

function updateStats() {
  const statsEl = document.getElementById('stats');
  if (!properties.length) { statsEl.style.display = 'none'; return; }
  statsEl.style.display = 'grid';

  document.getElementById('s-total').textContent = properties.length;

  const loaded = properties.filter(p => p.status === 'loaded');
  const allInsp = [];
  loaded.forEach(p => (p.inspections||[]).forEach(i => allInsp.push({ ...i, property: p })));

  document.getElementById('s-weekend').textContent = allInsp.filter(i => isThisWeekend(i.date)).length;
  const next = allInsp.find(i => i.date);
  document.getElementById('s-next').textContent = next ? next.date : '—';

  const prices = loaded.map(p => {
    if (!p.priceGuide) return null;
    const m = p.priceGuide.replace(/,/g,'').match(/[\d.]+[mM]/);
    if (m) return parseFloat(m[0]) * 1000000;
    const m2 = p.priceGuide.replace(/,/g,'').match(/\d{6,}/);
    if (m2) return parseInt(m2[0]);
    return null;
  }).filter(Boolean);

  if (prices.length) {
    const avg = prices.reduce((a,b)=>a+b,0)/prices.length;
    document.getElementById('s-avg').textContent = '$' + (avg/1000000).toFixed(2) + 'M';
  } else {
    document.getElementById('s-avg').textContent = '—';
  }
}

function renderAll() {
  const container = document.getElementById('cards-container');
  if (!properties.length) {
    container.innerHTML = `<div class="empty" style="grid-column:1/-1"><i class="ti ti-home-search"></i><h3>No properties yet</h3><p>Paste a Domain or REA link above to get started</p></div>`;
  } else {
    container.innerHTML = properties.map(renderCard).join('');
  }
  updateStats();
  if (activeTab === 'plan') renderPlan();
}

function exportData() {
  const blob = new Blob([JSON.stringify(properties, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'property-tracker-export.json';
  a.click();
}

function clearAll() {
  if (!confirm('Remove all saved properties?')) return;
  properties = [];
  saveToStorage();
  renderAll();
}

loadFromStorage();
</script>
</body>
</html>
